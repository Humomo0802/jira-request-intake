name: Deploy Backend to Apps Script

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apps-script-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      CLASP_JSON: ${{ secrets.CLASP_JSON }}
      APPS_SCRIPT_DEPLOYMENT_ID: ${{ secrets.APPS_SCRIPT_DEPLOYMENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate deployment secrets
        shell: bash
        run: |
          test -n "$CLASPRC_JSON" || { echo "Missing CLASPRC_JSON secret"; exit 1; }
          test -n "$CLASP_JSON" || { echo "Missing CLASP_JSON secret"; exit 1; }
          test -n "$APPS_SCRIPT_DEPLOYMENT_ID" || { echo "Missing APPS_SCRIPT_DEPLOYMENT_ID secret"; exit 1; }

      - name: Configure clasp
        shell: bash
        run: |
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          printf '%s' "$CLASP_JSON" > .clasp.json

      - name: Push Apps Script files
        run: npx --yes @google/clasp@3.3.0 push --force

      - name: Create Apps Script version
        id: version
        shell: bash
        run: |
          VERSION_OUTPUT="$(npx --yes @google/clasp@3.3.0 version "GitHub ${GITHUB_SHA::7}")"
          printf '%s\n' "$VERSION_OUTPUT"
          VERSION_NUMBER="$(printf '%s\n' "$VERSION_OUTPUT" | sed -n 's/^Created version \([0-9][0-9]*\)$/\1/p')"
          test -n "$VERSION_NUMBER" || { echo "Could not determine Apps Script version"; exit 1; }
          echo "number=$VERSION_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Update production deployment
        run: >-
          npx --yes @google/clasp@3.3.0 redeploy
          "$APPS_SCRIPT_DEPLOYMENT_ID"
          --versionNumber "${{ steps.version.outputs.number }}"
          --description "GitHub ${GITHUB_SHA::7}"
